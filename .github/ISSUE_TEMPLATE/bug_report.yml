name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Claude Code
        - Cursor
        - Copilot CLI
        - Gemini CLI
        - Codex
        - OpenCode
        - CLI (anki-export)
    validations:
      required: true
  - type: dropdown
    id: export-format
    attributes:
      label: Export format
      options:
        - TSV
        - APKG
        - N/A
    validations:
      required: false
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: false
